# Persian presentation copy for publication indexes.
#
# Canonical works, editions, bodies of work, and theme classifications remain in
# _data/publications.yml. This file only localizes display labels and summaries,
# keyed by the registry's stable work IDs.

content_types:
  essay: جستار
  research-note: یادداشت پژوهشی
  reading-note: یادداشت مطالعه
  translation: ترجمه

edition_labels:
  fa: فارسی
  en: انگلیسی

summaries:
  k2-llm-judge: "معماری‌ای عملی برای بازبینی امن و چندایجنتی Pull Requestها، با اتصال به SHA، گیت‌های شواهد، یافته‌های درون‌خطی کم‌نویز و حلقه‌ای جدا برای رسیدگی به بازخورد."
  phase-oriented-agent-skills: "معماری مرجعی برای فازهای صریح، بارگذاری تنبل، عوارض جانبی محدود، تحویل‌های قابل‌ازسرگیری و اجرای آزمون‌پذیر ایجنت‌ها."
  ten-years-of-familylink: "بازاندیشی درباره‌ی یک پروژه‌ی ده‌ساله‌ی اثر اجتماعی، محدودیت‌های شواهد آن و شکست مدل تأمین مالی و تداومش."
  acceptance-before-change: "استدلالی درباره‌ی دیدن روشن واقعیت انسان و رابطه، به‌اندازه‌ای که مرزبندی، یادگیری و تغییر مسئولانه ممکن شود."
  when-the-question-changes: "استدلالی مبتنی بر تجربه درباره‌ی اینکه گذار از جهان‌بینی پول به تعهدی فراتر از خود چگونه توجه، هماهنگی، مدل‌های کسب‌وکار و یادگیری سازمانی را تغییر می‌دهد."
  commitment-context-learning: "پرس‌وجویی میدانی درباره‌ی اینکه موضوع تعهدِ یادگیرنده چگونه ممکن است توجه، جست‌وجوی منابع، پایداری و یادگیری پروژه‌محور را سازمان دهد."
  vocora-learning-metrics: "فعالیت تمرینی، عملکرد فعلی و ماندگاری بلندمدت را از هم جدا می‌کند و روشن می‌سازد Vocora چه چیزی را باید و نباید «یادگیری» بنامد."
  retrieval-practice: "بررسی می‌کند تمرین بازیابی از چه چیزهایی پشتیبانی می‌کند، چه چیزی را اثبات نمی‌کند و این سازوکار اکنون چگونه در Vocora به کار می‌رود."
  spaced-practice-and-leitner: "اثر عمومی فاصله‌گذاری را از برنامه‌ی عملی فعلی Vocora که هنوز بهینه نشده است متمایز می‌کند."
  ethical-gamification: "برای هدف‌ها، زنجیره‌های تداوم، بازخورد پیشرفت و اشتراک‌گذاری، مرزهایی درباره‌ی خودمختاری، انگیزه، حریم خصوصی و شواهد تعریف می‌کند."
  hebbs-rule: "یادداشتی مفهومی و محتاطانه درباره‌ی یادگیری هبی، تداعی و محدودیت‌های استفاده از یک اصل عصبی برای توضیح احساس یا رفتار."
  crucibles-of-leadership: "یادداشت‌هایی بر روایت وارن بنیس و رابرت توماس از تجربه‌ی دشوار، هویت، یادگیری و رشد راهبری."
  a-new-model-of-leadership: "یادداشتی منبع‌محور درباره‌ی مدل هستی‌شناختی و پدیدارشناختی راهبری و تفاوت میان دانستن درباره‌ی راهبری و راهبری‌کردن در عمل."
  art-groupwork-communication: "یادداشتی پژوهشی درباره‌ی اینکه هنر چگونه می‌تواند تعارض ناگفته، ترس از قضاوت، روابط قدرت و الگوهای تکرارشونده‌ی تعامل در گروه‌ها را آشکار کند."
  journaling: "یادداشتی منبع‌محور درباره‌ی نوشتن بیانگر، ساخت روایت، تجربه‌های دشوار، تنظیم هیجان و ادعاهای مطرح‌شده درباره‌ی پروتکل ژورنال‌نویسی پنبیکر."
  being-and-time: "خوانشی از «هستی و زمان» در گفت‌وگو با «Speaking Being» و تجربه‌ی نویسنده از راهبری، زبان و کنش انسانی."
  holistic-learning: "مروری انتقادی و میان‌رشته‌ای بر یادگیری کل‌نگر، شیوه‌های بودن، هایدگر و امکان آموزش راهبری آگاه از شواهد."
  smarter-faster-better: "یادداشت‌هایی درباره‌ی تصمیم‌گیری، تمرکز، انگیزه، تیم‌ها و طراحی بهره‌وری پایدار."
  tao-te-ching: "یادداشت‌هایی درباره‌ی تائو تِ چینگ، سادگی، کنش بی‌تکلف، فلسفه‌ی شرقی، زندگی و راهبری."
  the-infinite-game: "خوانشی از راهبری بلندمدت، هدف، اعتماد، تاب‌آوری و سازمان‌هایی که برای چیزی فراتر از پیروزی‌های کوتاه‌مدت ساخته می‌شوند."
  the-power-of-habit: "یادداشت‌هایی درباره‌ی چرخه‌های عادت، عادت‌های کلیدی و تغییر رفتار در افراد، سازمان‌ها و جوامع."
  thinking-fast-and-slow: "یادداشت‌هایی درباره‌ی تفکر سریع و کند، سوگیری شناختی، شهود، قضاوت و تصمیم‌گیری در زندگی و کار."
  how-your-brain-finds-patterns: "ترجمه و اقتباسی فارسی از یک معرفی عمومی درباره‌ی یادگیری آماری و تشخیص الگوهای زبان."
