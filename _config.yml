# Site settings
# These values are available to Jekyll templates through the `site` object.
title: OkBayat
description: "Mohammad Bayat — building quantitative systems and studying human learning and transformation."
baseurl: ""
url: "https://www.okbayat.com"
repository: OkBayat/OkBayat.github.io

permalink: pretty

defaults:
  - scope:
      path: "docs"
      type: "pages"
    values:
      layout: "default"

  # Keep canonical article pages discoverable through their type index, topical
  # indexes, internal links, and search without crowding the global sidebar.
  # The four section indexes explicitly opt back in with `nav_exclude: false`.
  - scope:
      path: "docs/thinking/essays"
      type: "pages"
    values:
      nav_exclude: true

  - scope:
      path: "docs/thinking/research-notes"
      type: "pages"
    values:
      nav_exclude: true

  - scope:
      path: "docs/thinking/reading-notes"
      type: "pages"
    values:
      nav_exclude: true

  - scope:
      path: "docs/thinking/translations"
      type: "pages"
    values:
      nav_exclude: true

  # Keep detailed legacy material accessible through its section hub and search
  # without allowing every course, concept, cohort, or source page to crowd the
  # global sidebar. Section index pages explicitly opt back in with
  # `nav_exclude: false`.
  - scope:
      path: "docs/leadership/courses"
      type: "pages"
    values:
      nav_exclude: true

  - scope:
      path: "docs/leadership/research"
      type: "pages"
    values:
      nav_exclude: true

  - scope:
      path: "docs/leadership/resources"
      type: "pages"
    values:
      nav_exclude: true

  - scope:
      path: "docs/leadership/coaching"
      type: "pages"
    values:
      nav_exclude: true

  - scope:
      path: "docs/about/calendar"
      type: "pages"
    values:
      nav_exclude: true

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - "*.gemspec"
  - "*.gem"
  - LICENSE.txt
  - package.json
  - package-lock.json
  - Rakefile
  - README.md
  - CODE_OF_CONDUCT.md
  - docker-compose.yml
  - Dockerfile
  - fixtures/

logo: "/assets/images/logo.png"

search_enabled: true
search:
  heading_level: 3
  previews: 2
  preview_words_before: 3
  preview_words_after: 3
  tokenizer_separator: /[\s\-/،؛؟]+/
  rel_url: true
  button: false
  focus_shortcut_key: "k"

enable_copy_code_button: true

mermaid:
  version: "9.1.6"

heading_anchors: true

aux_links:
  "Website source":
    - "https://github.com/OkBayat/OkBayat.github.io"
aux_links_new_tab: true

nav_enabled: true
nav_sort: case_sensitive

nav_external_links:
  - title: OkBayat on GitHub
    url: https://github.com/OkBayat

  - title: OkBayat on LinkedIn
    url: https://www.linkedin.com/in/okbayat/

  - title: OkBayat on Instagram
    url: https://www.instagram.com/OkBayat

nav_error_report: true

liquid:
  error_mode: strict
  strict_filters: true

back_to_top: true
back_to_top_text: "Back to top"

footer_content: "Copyright &copy; 2023&ndash;2026 Mohammad Bayat. Website source is available under the MIT license."

last_edit_timestamp: true
last_edit_time_format: "%b %e %Y at %I:%M %p"

gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/OkBayat/OkBayat.github.io"
gh_edit_branch: "main"
gh_edit_view_mode: "tree"

color_scheme: nil

callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

plugins:
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-include-cache
  - jekyll-sitemap

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

markdown: MyCustomProcessor

compress_html:
  clippings: all
  comments: all
  endings: all
  startings: []
  blanklines: false
  profile: false
