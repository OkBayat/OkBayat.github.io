<article class="evidence-card">
  <div class="evidence-card-heading">
    <p class="evidence-card-type">{{ include.type }}</p>
    {% if include.status %}<p class="evidence-card-status">{{ include.status }}</p>{% endif %}
  </div>
  <h3 class="evidence-card-title"><a href="{{ include.url | relative_url }}">{{ include.title }}</a></h3>
  <p class="evidence-card-question">{{ include.question }}</p>
  <dl class="evidence-card-details">
    <div>
      <dt>My Role</dt>
      <dd>{{ include.role }}</dd>
    </div>
    <div>
      <dt>Evidence</dt>
      <dd>{{ include.evidence }}</dd>
    </div>
    <div>
      <dt>Limits</dt>
      <dd>{{ include.limits }}</dd>
    </div>
  </dl>
  <a class="evidence-card-link" href="{{ include.url | relative_url }}">View this work <span aria-hidden="true">&rarr;</span></a>
</article>
