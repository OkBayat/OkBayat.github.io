<style>
.theme-toggle {
  display: inline-flex;
  width: 2.25rem;
  height: 2.25rem;
  align-items: center;
  justify-content: center;
  margin-left: .75rem;
  cursor: pointer;
  color: inherit;
  background: transparent;
  border: 1px solid currentColor;
  border-radius: 50%;
  opacity: .8;
  transition: opacity .15s ease, background-color .15s ease;
}

.theme-toggle:hover,
.theme-toggle:focus-visible {
  opacity: 1;
  background-color: rgba(128, 128, 128, .12);
}

.theme-toggle:focus-visible {
  outline: 2px solid currentColor;
  outline-offset: 2px;
}

.theme-toggle-icon {
  font-size: 1.1rem;
  line-height: 1;
}

@media (max-width: 49.99rem) {
  .theme-toggle {
    margin-left: auto;
  }
}
</style>

<button class="theme-toggle" type="button" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
  <span class="theme-toggle-icon" aria-hidden="true">◐</span>
</button>

<script>
  (function () {
    var storageKey = "okbayat-theme";

    function getPreferredTheme() {
      var saved = localStorage.getItem(storageKey);
      if (saved === "dark" || saved === "light") {
        return saved;
      }

      return window.matchMedia("(prefers-color-scheme: dark)").matches
        ? "dark"
        : "light";
    }

    function applyTheme(theme) {
      if (window.jtd && window.jtd.setTheme) {
        window.jtd.setTheme(theme);
      }
      document.documentElement.dataset.theme = theme;

      var button = document.getElementById("theme-toggle");
      if (button) {
        button.setAttribute(
          "aria-label",
          theme === "dark" ? "Switch to light mode" : "Switch to dark mode"
        );
        button.title = theme === "dark" ? "Light mode" : "Dark mode";
      }
    }

    window.jtdTheme = getPreferredTheme();

    document.addEventListener("DOMContentLoaded", function () {
      applyTheme(window.jtdTheme);

      var button = document.getElementById("theme-toggle");
      if (!button) return;

      button.addEventListener("click", function () {
        window.jtdTheme = window.jtdTheme === "dark" ? "light" : "dark";
        localStorage.setItem(storageKey, window.jtdTheme);
        applyTheme(window.jtdTheme);
      });
    });
  })();
</script>
