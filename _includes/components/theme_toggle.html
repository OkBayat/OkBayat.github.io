<button class="theme-toggle" type="button" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
  <span class="theme-toggle-icon" aria-hidden="true">◐</span>
</button>

<script>
  (function () {
    var storageKey = "okbayat-theme";

    function getPreferredTheme() {
      var saved = localStorage.getItem(storageKey);
      if (saved === "dark" || saved === "light") {
        return saved;
      }

      return window.matchMedia("(prefers-color-scheme: dark)").matches
        ? "dark"
        : "light";
    }

    function applyTheme(theme) {
      if (window.jtd && window.jtd.setTheme) {
        window.jtd.setTheme(theme);
      }
      document.documentElement.dataset.theme = theme;

      var button = document.getElementById("theme-toggle");
      if (button) {
        button.setAttribute(
          "aria-label",
          theme === "dark" ? "Switch to light mode" : "Switch to dark mode"
        );
        button.title = theme === "dark" ? "Light mode" : "Dark mode";
      }
    }

    window.jtdTheme = getPreferredTheme();

    document.addEventListener("DOMContentLoaded", function () {
      applyTheme(window.jtdTheme);

      var button = document.getElementById("theme-toggle");
      if (!button) return;

      button.addEventListener("click", function () {
        window.jtdTheme = window.jtdTheme === "dark" ? "light" : "dark";
        localStorage.setItem(storageKey, window.jtdTheme);
        applyTheme(window.jtdTheme);
      });
    });
  })();
</script>
