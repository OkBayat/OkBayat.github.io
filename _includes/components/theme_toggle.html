<button class="theme-toggle" type="button" id="theme-toggle" aria-label="Switch to dark mode" title="Switch to dark mode">
  <span class="theme-toggle-icon" aria-hidden="true">
    <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="4"></circle>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
    </svg>
    <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24">
      <path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"></path>
    </svg>
  </span>
</button>

<script>
  (function () {
    var storageKey = "okbayat-theme";

    function currentTheme() {
      return window.jtdTheme === "dark" ||
        document.documentElement.dataset.theme === "dark"
        ? "dark"
        : "light";
    }

    function updateButton(theme) {
      var button = document.getElementById("theme-toggle");
      if (!button) return;

      var dark = theme === "dark";
      button.setAttribute(
        "aria-label",
        dark ? "Switch to light mode" : "Switch to dark mode"
      );
      button.title = dark ? "Light mode" : "Dark mode";
    }

    function applyTheme(theme) {
      var stylesheet = document.getElementById("jtd-theme-stylesheet");

      window.jtdTheme = theme;
      document.documentElement.dataset.theme = theme;

      if (stylesheet) {
        stylesheet.href =
          "{{ '/assets/css/just-the-docs-' | relative_url }}" + theme + ".css";
      } else if (window.jtd && window.jtd.setTheme) {
        window.jtd.setTheme(theme);
      }

      try {
        window.localStorage.setItem(storageKey, theme);
      } catch (error) {
        // The selected theme still applies for this page when storage is unavailable.
      }

      updateButton(theme);
    }

    document.addEventListener("DOMContentLoaded", function () {
      var button = document.getElementById("theme-toggle");
      if (!button) return;

      updateButton(currentTheme());
      button.addEventListener("click", function () {
        applyTheme(currentTheme() === "dark" ? "light" : "dark");
      });
    });
  })();
</script>
