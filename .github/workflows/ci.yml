on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

name: CI

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publications:
    name: Validate publication registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Validate publication registry
        shell: bash
        run: |
          set -o pipefail
          ruby scripts/validate_publications.rb 2>&1 | tee publication-validation.txt
      - name: Upload publication validation diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: publication-validation
          path: publication-validation.txt
          if-no-files-found: error
          retention-days: 7

  jekyll-build:
    name: Build (jekyll gem)
    strategy:
      fail-fast: false
      matrix:
        jekyll-version: [3.9, 4.3]
        os: [ubuntu-latest, macos-latest, windows-latest]
        ruby-version: ["3.1", "3.2", "3.3", "3.4"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: false
      - name: Bundle Install (Jekyll ${{ matrix.jekyll-version }})
        run: bundle install
        env:
          BUNDLE_GEMFILE: fixtures/Gemfile-jekyll-${{ matrix.jekyll-version }}
      - name: Init Search
        run: bundle exec rake search:init
        env:
          BUNDLE_GEMFILE: fixtures/Gemfile-jekyll-${{ matrix.jekyll-version }}
      - name: Build Site
        run: bundle exec jekyll build
        env:
          BUNDLE_GEMFILE: fixtures/Gemfile-jekyll-${{ matrix.jekyll-version }}

  github-pages-build:
    name: Build (github-pages gem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: false
      - name: Bundle Install
        run: bundle install
        env:
          BUNDLE_GEMFILE: fixtures/Gemfile-github-pages
      - name: Build Site
        run: bundle exec jekyll build
        env:
          BUNDLE_GEMFILE: fixtures/Gemfile-github-pages

  validate:
    name: Validate HTML and navigation
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ["3.4"]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
      - name: Cache HTMLProofer
        id: cache-htmlproofer
        uses: actions/cache@v3
        with:
          path: tmp/.htmlproofer
          key: ${{ runner.os }}-htmlproofer
      - name: Validate custom Markdown processor
        run: bundle exec ruby scripts/validate_custom_markdown_processor.rb
      - name: Validate list and sidebar styles
        run: ruby scripts/validate_list_and_sidebar_styles.rb
      - name: Build Site
        run: bundle exec jekyll build
      - name: Validate page languages and internal links
        run: node scripts/validate_site_integrity.js _site
      - name: Validate profile photos
        run: ruby scripts/validate_profile_photos.rb _site
      - name: Validate navigation priorities
        run: ruby scripts/validate_navigation_priorities.rb _site
      - name: Validate automatic child-page lists
        run: ruby scripts/validate_child_page_navigation.rb _site
      - name: Validate publication navigation
        run: ruby scripts/validate_publication_navigation.rb _site
      - name: Validate research and writing timeline
        run: ruby scripts/validate_timeline.rb _site
      - name: Validate article language switches
        run: ruby scripts/validate_article_language_switch.rb _site
      - name: Test with Nu Validator
        id: nu-validator
        continue-on-error: true
        uses: Cyb3r-Jak3/html5validator-action@2a593a9f2c10593cbac84791a6fc4c47e9a106c8
        with:
          config: fixtures/html5validator-config.yml
      - name: Upload Nu Validator diagnostics
        if: steps.nu-validator.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: nu-validator-diagnostics
          path: log.log
          if-no-files-found: error
          retention-days: 7
      - name: Fail when Nu Validator reports errors
        if: steps.nu-validator.outcome == 'failure'
        run: exit 1
#      - name: Test with html-proofer
#        run: bundle exec htmlproofer _site --ignore-urls "/github.com/,/web.archive.org/"
#        env:
#          NOKOGIRI_USE_SYSTEM_LIBRARIES: true

  assets:
    name: Test CSS and JS
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - name: Validate content architecture
        run: npm run lint:architecture
      - name: Validate source content
        run: npm run lint:content
      - name: Validate stylesheets
        id: stylelint
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run lint:css 2>&1 | tee stylelint.log
      - name: Upload Stylelint diagnostics
        if: steps.stylelint.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: stylelint-diagnostics
          path: stylelint.log
          if-no-files-found: error
          retention-days: 7
      - name: Generate canonical formatting
        id: prettier
        continue-on-error: true
        shell: bash
        run: |
          npm run format
          git diff -- assets/css/timeline.scss assets/js/timeline.js package.json > prettier.patch
          test ! -s prettier.patch
      - name: Upload Prettier diagnostics
        if: steps.prettier.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: prettier-diagnostics
          path: |
            prettier.patch
            assets/css/timeline.scss
            assets/js/timeline.js
            package.json
          if-no-files-found: error
          retention-days: 7
      - name: Validate timeline JavaScript
        run: npm run lint:javascript
      - name: Fail when asset validation reports errors
        if: steps.stylelint.outcome == 'failure' || steps.prettier.outcome == 'failure'
        run: exit 1
